<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #2b2d31;
      color: #dbdee1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .header svg {
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f2f3f5;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1f22;
      border-radius: 8px;
      padding: 12px;
    }

    .toggle-label {
      font-size: 13px;
      color: #dbdee1;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #4e5058;
      border-radius: 11px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #23a559;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .status {
      margin-top: 10px;
      font-size: 11px;
      color: #949ba4;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" fill="#dbdee1"/>
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12Z" stroke="#dbdee1" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M7 2L5 5M17 2l2 3" stroke="#dbdee1" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>Camera Unmirror</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Unmirror camera</span>
    <label class="toggle">
      <input type="checkbox" id="toggleUnmirror">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status">Loading...</div>

  <script src="popup.js"></script>
</body>
</html>
